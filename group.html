<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups | ArtKonekt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <script src="assets/js/save-current-user.js"></script>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white shadow-sm">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i data-feather="users" class="text-indigo-600"></i>
                    <span class="ml-2 text-xl font-semibold text-gray-900">ArtKonekt Groups</span>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Home</a>
                    
                    <a href="group.html" class="text-indigo-600 border-b-2 border-indigo-600 px-3 py-2 text-sm font-medium">Groups</a>
                </div>
                <div class="flex items-center">
                    <a href="dashboard_new.html" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Dashboard</a>
                    
                </div>
            </div>
        </nav>
    </header>
    <main class="container mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Groups & Collaboration</h1>
        <div class="bg-white rounded-xl shadow-lg p-8 mb-8">
            <h2 class="text-xl font-semibold mb-2 text-gray-800">Join or Create a Group</h2>
            <p class="mb-4 text-gray-600">Collaborate with classmates, share ideas, and work together on projects and challenges.</p>
            <form id="groupForm" class="flex flex-col md:flex-row gap-4">
                <input type="text" id="groupCode" class="border border-gray-300 rounded-md px-4 py-2 w-full md:w-1/2" placeholder="Enter group code or name" required>
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-md font-semibold hover:bg-indigo-700">Join/Create Group</button>
            </form>
            <div id="groupStatus" class="mt-4 text-green-600 font-medium"></div>
        </div>
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-xl font-semibold mb-2 text-gray-800">Your Group</h2>
            <div id="currentGroup" class="text-gray-700">Not in a group yet.</div>
        </div>
    </main>
    <script>
    feather.replace();
    // Group join/create logic
    const groupForm = document.getElementById('groupForm');
    const groupCodeInput = document.getElementById('groupCode');
    const groupStatus = document.getElementById('groupStatus');
    const currentGroupDiv = document.getElementById('currentGroup');
    // Load current group from user
    function loadCurrentGroup() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (user && user.groupCode) {
            currentGroupDiv.textContent = user.groupCode;
        } else {
            currentGroupDiv.textContent = 'Not in a group yet.';
        }
    }
    loadCurrentGroup();
    groupForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const groupCode = groupCodeInput.value.trim();
        if (!groupCode) return;
        let user = JSON.parse(localStorage.getItem('currentUser'));
        if (user) {
            user.groupCode = groupCode;
            try { if (window.saveCurrentUser) saveCurrentUser(user); else localStorage.setItem('currentUser', JSON.stringify(user)); } catch (e) { localStorage.setItem('currentUser', JSON.stringify(user)); }
            groupStatus.textContent = 'Group joined/created successfully!';
            loadCurrentGroup();
        } else {
            groupStatus.textContent = 'Please sign in to join a group.';
        }
    });
    </script>
</body>
</html>
