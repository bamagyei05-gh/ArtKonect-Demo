<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Principles of Design Summative Quiz</title>
    <link rel="stylesheet" href="Styles/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <header class="bg-white shadow-sm">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
            <div class="flex items-center">
                <i data-feather="layers" class="text-indigo-600"></i>
                <span class="ml-2 text-xl font-semibold text-gray-900">Visual Arts</span>
            </div>
            <div class="flex items-center space-x-8">
                <a href="index.html" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Home</a>
                <a href="learn.html" class="text-indigo-600 border-b-2 border-indigo-600 px-3 py-2 text-sm font-medium">Learn</a>
                <a href="dashboard_new.html" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Dashboard</a>
            </div>
        </nav>
    </header>
    <main class="max-w-3xl mx-auto px-4 py-12">
        <h1 class="text-3xl font-bold mb-4 text-indigo-700">Principles of Design Summative Assessment</h1>
        <p class="mb-6 text-lg text-gray-700">Answer all 30 multiple-choice questions below. Good luck!</p>
        <form id="principlesQuiz">
            <!-- 30 MCQ questions will be inserted here -->
        </form>
        <button id="submitPrinciplesQuiz" class="mt-8 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded font-semibold">Submit Quiz</button>
        <div id="principlesQuizResult" class="mt-6 text-lg font-bold"></div>
    </main>
    <script src="https://unpkg.com/feather-icons"></script>
    <script>feather.replace();</script>
    <script src="assets/js/save-current-user.js"></script>
    <script>
    // Principles of Design Quiz Questions (30 items covering Balance, Emphasis, Rhythm, Proportion, White Space, Harmony, Unity)
    const questions = [
        { q: "Which principle refers to the distribution of visual weight?", options: ["Rhythm","Balance","Emphasis","Unity"], answer: 1 },
        { q: "When one element is made to stand out, which principle is being used?", options: ["Balance","Proportion","Emphasis","Rhythm"], answer: 2 },
        { q: "Which principle is created by repeating elements in a regular or varied pattern?", options: ["Harmony","Rhythm","Texture","Balance"], answer: 1 },
        { q: "What does proportion relate to in a composition?", options: ["Value only","Size relationships","Colour harmony","Line quality"], answer: 1 },
        { q: "Which principle helps guide the viewer through a layout by arranging elements in order?", options: ["Rhythm","White Space","Form","Texture"], answer: 0 },
        { q: "Leaving intentional empty space in a design is known as:", options: ["Whitespace","Crowding","Texture","Clutter"], answer: 0 },
        { q: "Which principle describes how parts of a design feel visually connected and cohesive?", options: ["Contrast","Unity","Emphasis","Scale"], answer: 1 },
        { q: "Which approach increases emphasis on an object?", options: ["Decrease contrast","Increase contrast","Use identical sizes","Place at center only"], answer: 1 },
        { q: "Alternating shapes or colours to produce movement is an example of which principle?", options: ["Proportion","Rhythm","Balance","Unity"], answer: 1 },
        { q: "When elements are balanced symmetrically it often feels:", options: ["Stable","Chaotic","Aggressive","Unfriendly"], answer: 0 },

        { q: "Asymmetrical balance uses which strategy?", options: ["Identical mirror images","Different elements that have equal visual weight","Only central placement","Only size difference"], answer: 1 },
        { q: "Which principle would you use to create a clear focal point?", options: ["Unity","Harmony","Emphasis","Repetition"], answer: 2 },
        { q: "Which principle is closely related to contrast?", options: ["Emphasis","Balance","Proportion","White Space"], answer: 0 },
        { q: "Using gradual changes in size or spacing to lead the eye is called:", options: ["Harmony","Progression (a type of rhythm)","Static balance","Texture"], answer: 1 },
        { q: "Which principle helps when arranging elements to avoid visual clutter?", options: ["White Space","High Saturation","Overlapping","Equal spacing only"], answer: 0 },
        { q: "Which principle supports readability and breathing room in layouts?", options: ["Texture","White Space","Rhythm","Form"], answer: 1 },
        { q: "Harmonious colour and shape combinations usually strengthen which principle?", options: ["Proportion","Unity","Contrast","Emphasis"], answer: 1 },
        { q: "Which principle would be assessed when comparing the size of elements to one another?", options: ["Rhythm","Proportion","Texture","Unity"], answer: 1 },
        { q: "Which principle can be deliberately broken to create surprise or emphasis?", options: ["Unity","Balance","Harmony","Emphasis"], answer: 3 },
        { q: "Which principle would be used to create a calm composition using repetition and gentle variation?", options: ["Harmony","Rhythm","Proportion","Contrast"], answer: 1 },

        { q: "Which tool helps designers measure and compare proportions?", options: ["Rule of thirds/grid","Only intuition","Colour wheel","Texture swatches"], answer: 0 },
        { q: "Which principle encourages a relationship between parts so they read as a single whole?", options: ["Emphasis","Unity","Rhythm","Contrast"], answer: 1 },
        { q: "Which strategy would reduce dominance of an element that is too strong?", options: ["Increase its saturation","Decrease its contrast/value","Make it larger","Add more elements of the same size"], answer: 1 },
        { q: "Which approach creates a dynamic and lively rhythm?", options: ["Exact repetition only","Alternation and progression","No repetition","Uniform spacing only"], answer: 1 },
        { q: "Which principle best describes visual relationships created by shared edges, alignment, or proximity?", options: ["Unity","Balance","Emphasis","Texture"], answer: 0 },

        { q: "Which principle is most helped by consistent typography and spacing in a layout?", options: ["Emphasis","Unity","Proportion","Rhythm"], answer: 1 },
        { q: "Which of these is a negative consequence of too little white space?", options: ["Improved clarity","Visual clutter","Increased harmony","Better emphasis"], answer: 1 },
        { q: "What role does rhythm play in narrative or sequence-based designs?", options: ["Creates static imagery only","Guides the viewer through time/steps","Removes emphasis","Reduces unity"], answer: 1 },
        { q: "Which principle is most directly tested by asking whether parts of a composition relate in size and scale?", options: ["Balance","Proportion","Texture","Colour"], answer: 1 }
    ];

    const form = document.getElementById('principlesQuiz');
    questions.forEach((q, idx) => {
        const div = document.createElement('div');
        div.className = 'mb-6 p-4 bg-white rounded shadow';
        div.innerHTML = `<p class='font-medium mb-2'>${idx+1}. ${q.q}</p>` +
            q.options.map((opt, oi) => `<label class='block mb-1'><input type='radio' name='q${idx}' value='${oi}' class='mr-2'>${opt}</label>`).join('');
        form.appendChild(div);
    });

    document.getElementById('submitPrinciplesQuiz').onclick = function() {
        let score = 0;
        questions.forEach((q, idx) => {
            const selected = form.querySelector(`input[name='q${idx}']:checked`);
            if(selected && Number(selected.value) === q.answer) score++;
        });
        // Show results and reveal correct/incorrect answers
        let resultHtml = `<div class='mb-4'>You scored <span class='font-bold text-indigo-700'>${score} out of 30</span>.</div>`;
        questions.forEach((q, idx) => {
            const selected = form.querySelector(`input[name='q${idx}']:checked`);
            const userAnswer = selected ? Number(selected.value) : null;
            const isCorrect = userAnswer === q.answer;
            resultHtml += `<div class='mb-2 p-3 rounded ${isCorrect ? 'bg-green-50 border border-green-400' : 'bg-red-50 border border-red-400'}'>` +
                `<span class='font-semibold'>Q${idx+1}:</span> ${q.q}<br>` +
                `<span>Your answer: <span class='${isCorrect ? 'text-green-700' : 'text-red-700'}'>${userAnswer !== null ? q.options[userAnswer] : '<em>No answer</em>'}</span></span><br>` +
                (!isCorrect ? `<span>Correct answer: <span class='text-green-700 font-semibold'>${q.options[q.answer]}</span></span>` : '') +
            `</div>`;
        });
        document.getElementById('principlesQuizResult').innerHTML = resultHtml;
        // Save score to user progress in localStorage
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (currentUser) {
            if (!currentUser.progress) currentUser.progress = { lessonsCompleted: [], quizScores: {} };
            currentUser.progress.quizScores = currentUser.progress.quizScores || {};
            currentUser.progress.quizScores['principles'] = Math.round((score/30)*100);
            try { if (window.saveCurrentUser) saveCurrentUser(currentUser); else localStorage.setItem('currentUser', JSON.stringify(currentUser)); } catch (e) {}
        }
    };
    </script>
</body>
</html>
